name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install pytest pytest-cov 2>/dev/null || true
          pip install -e ".[dev]" 2>/dev/null || pip install -e . 2>/dev/null || true
          test -f requirements.txt && pip install -r requirements.txt 2>/dev/null || true
          test -f requirements-dev.txt && pip install -r requirements-dev.txt 2>/dev/null || true

      - name: Run tests
        id: pytest
        run: |
          TEST_DIRS=""
          for d in tests test src; do
            if [ -d "$d" ] && find "$d" -name "test_*.py" 2>/dev/null | grep -q .; then
              TEST_DIRS="$TEST_DIRS $d"
            fi
          done
          if [ -z "$TEST_DIRS" ]; then TEST_DIRS="."; fi
          pytest $TEST_DIRS -v --tb=short --ignore=node_modules 2>&1
        continue-on-error: true

      - name: Self-heal import errors
        if: steps.pytest.outcome == 'failure'
        run: |
          python -c "
import subprocess, pathlib
result = subprocess.run(['pytest','tests','-v','--tb=short'], capture_output=True, text=True)
output = result.stdout + result.stderr
if 'ImportError' in output or 'ModuleNotFoundError' in output:
    conf = pathlib.Path('conftest.py')
    heal = '''import sys, os
for d in [\"src\", \".\", \"lib\"]:
    p = os.path.join(os.path.dirname(os.path.abspath(__file__)), d)
    if os.path.exists(p) and p not in sys.path:
        sys.path.insert(0, p)
'''
    conf.write_text(heal)
    print('Generated conftest.py')
"
          git config user.email "ci@echo-universe.dev"
          git config user.name "Echo CI"
          git add conftest.py 2>/dev/null || true
          git diff --cached --quiet 2>/dev/null || git commit -m "fix: auto-generated conftest.py" 2>/dev/null || true
          git push origin HEAD 2>/dev/null || true

      - name: Final test run
        run: |
          TEST_DIRS=""
          for d in tests test src; do
            if [ -d "$d" ] && find "$d" -name "test_*.py" 2>/dev/null | grep -q .; then
              TEST_DIRS="$TEST_DIRS $d"
            fi
          done
          if [ -z "$TEST_DIRS" ]; then TEST_DIRS="."; fi
          pytest $TEST_DIRS -v --tb=short --ignore=node_modules
