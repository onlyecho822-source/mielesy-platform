name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install pytest pytest-cov 2>/dev/null || true
          pip install numpy scipy 2>/dev/null || true
          pip install -e ".[dev]" 2>/dev/null || pip install -e . 2>/dev/null || true
          test -f requirements.txt && pip install -r requirements.txt 2>/dev/null || true

      - name: Run tests
        run: |
          TEST_DIRS=""
          for d in tests test; do
            if [ -d "$d" ] && find "$d" -name "test_*.py" 2>/dev/null | grep -q .; then
              TEST_DIRS="$TEST_DIRS $d"
            fi
          done
          if [ -z "$TEST_DIRS" ]; then TEST_DIRS="tests"; fi
          pytest $TEST_DIRS -v --tb=short --ignore=node_modules 2>&1 || true
          pytest $TEST_DIRS -v --tb=short --ignore=node_modules
